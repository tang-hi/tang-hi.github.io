<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 388" font-family="-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif">
  <defs>
    <filter id="ns" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0.8" stdDeviation="0.9" flood-color="#2e405b" flood-opacity="0.16"/>
    </filter>
  </defs>
  <style>
    .nm{ fill:#eef1f5; stroke:#aab3c2; stroke-width:1.6 }
    .m{ fill:#e4f3ee; stroke:#2f9e7b; stroke-width:1.9 }
    .q{ fill:#c7254e; stroke:#9e1c3e; stroke-width:1.3 }
    .plot{ fill:#fcfdfe; stroke:#e3e8ef; stroke-width:1.5 }
    .dist{ stroke:#c7254e; stroke-width:1.2; opacity:.5; stroke-linecap:round }
    .title{ font-size:14.5px; font-weight:600; fill:#2e405b }
    .ok{ font-size:11.5px; font-weight:600; fill:#2f9e7b }
    .bad{ font-size:11.5px; font-weight:600; fill:#c7254e }
    .small{ font-size:11px; fill:#6b7892 }
    .premise{ font-size:12px; fill:#2e405b }
  </style>

  <rect x="1.5" y="1.5" width="717" height="385" rx="16" fill="#ffffff" stroke="#e7ebf1" stroke-width="1.5"/>
  <text class="premise" x="360" y="30" text-anchor="middle">Pre-filter throws the graph away, then brute-forces the distance to every matching point</text>
  <line x1="360" y1="62" x2="360" y2="308" stroke="#eceff3" stroke-width="1.5"/>

  <!-- ===== Panel A : low match rate ===== -->
  <g transform="translate(24,40)">
    <text class="title" x="150" y="22" text-anchor="middle">Low match rate</text>
    <rect class="plot" x="30" y="34" width="240" height="220" rx="10"/>
    <!-- distance lines query -> 4 green -->
    <line class="dist" x1="150" y1="150" x2="108" y2="118"/>
    <line class="dist" x1="150" y1="150" x2="198" y2="110"/>
    <line class="dist" x1="150" y1="150" x2="108" y2="200"/>
    <line class="dist" x1="150" y1="150" x2="205" y2="200"/>
    <!-- grey points -->
    <circle class="nm" cx="70" cy="74" r="6"/><circle class="nm" cx="120" cy="66" r="6"/><circle class="nm" cx="185" cy="66" r="6"/>
    <circle class="nm" cx="235" cy="80" r="6"/><circle class="nm" cx="255" cy="128" r="6"/><circle class="nm" cx="248" cy="190" r="6"/>
    <circle class="nm" cx="235" cy="230" r="6"/><circle class="nm" cx="180" cy="240" r="6"/><circle class="nm" cx="120" cy="240" r="6"/>
    <circle class="nm" cx="72" cy="230" r="6"/><circle class="nm" cx="58" cy="175" r="6"/><circle class="nm" cx="66" cy="116" r="6"/>
    <circle class="nm" cx="160" cy="86" r="6"/><circle class="nm" cx="150" cy="225" r="6"/>
    <!-- 4 green -->
    <circle class="m" cx="108" cy="118" r="6.5"/><circle class="m" cx="198" cy="110" r="6.5"/>
    <circle class="m" cx="108" cy="200" r="6.5"/><circle class="m" cx="205" cy="200" r="6.5"/>
    <g transform="translate(150,150) rotate(45)" filter="url(#ns)"><rect class="q" x="-7" y="-7" width="14" height="14" rx="3"/></g>
    <text class="ok" x="150" y="284" text-anchor="middle">few candidates &#8594; brute force is fast</text>
  </g>

  <!-- ===== Panel B : high match rate ===== -->
  <g transform="translate(384,40)">
    <text class="title" x="150" y="22" text-anchor="middle">High match rate</text>
    <rect class="plot" x="30" y="34" width="240" height="220" rx="10"/>
    <!-- distance lines query -> 15 green -->
    <line class="dist" x1="150" y1="150" x2="120" y2="66"/><line class="dist" x1="150" y1="150" x2="185" y2="66"/>
    <line class="dist" x1="150" y1="150" x2="235" y2="80"/><line class="dist" x1="150" y1="150" x2="255" y2="128"/>
    <line class="dist" x1="150" y1="150" x2="248" y2="190"/><line class="dist" x1="150" y1="150" x2="180" y2="240"/>
    <line class="dist" x1="150" y1="150" x2="72" y2="230"/><line class="dist" x1="150" y1="150" x2="58" y2="175"/>
    <line class="dist" x1="150" y1="150" x2="66" y2="116"/><line class="dist" x1="150" y1="150" x2="160" y2="86"/>
    <line class="dist" x1="150" y1="150" x2="108" y2="118"/><line class="dist" x1="150" y1="150" x2="198" y2="110"/>
    <line class="dist" x1="150" y1="150" x2="108" y2="200"/><line class="dist" x1="150" y1="150" x2="205" y2="200"/>
    <line class="dist" x1="150" y1="150" x2="150" y2="225"/>
    <!-- grey points (only 3) -->
    <circle class="nm" cx="70" cy="74" r="6"/><circle class="nm" cx="235" cy="230" r="6"/><circle class="nm" cx="120" cy="240" r="6"/>
    <!-- 15 green -->
    <circle class="m" cx="120" cy="66" r="6"/><circle class="m" cx="185" cy="66" r="6"/><circle class="m" cx="235" cy="80" r="6"/>
    <circle class="m" cx="255" cy="128" r="6"/><circle class="m" cx="248" cy="190" r="6"/><circle class="m" cx="180" cy="240" r="6"/>
    <circle class="m" cx="72" cy="230" r="6"/><circle class="m" cx="58" cy="175" r="6"/><circle class="m" cx="66" cy="116" r="6"/>
    <circle class="m" cx="160" cy="86" r="6"/><circle class="m" cx="108" cy="118" r="6"/><circle class="m" cx="198" cy="110" r="6"/>
    <circle class="m" cx="108" cy="200" r="6"/><circle class="m" cx="205" cy="200" r="6"/><circle class="m" cx="150" cy="225" r="6"/>
    <g transform="translate(150,150) rotate(45)" filter="url(#ns)"><rect class="q" x="-7" y="-7" width="14" height="14" rx="3"/></g>
    <text class="bad" x="150" y="284" text-anchor="middle">almost every point &#8594; a full-dataset scan</text>
  </g>

  <!-- legend (centered) -->
  <g transform="translate(224,364)">
    <circle class="m" cx="0" cy="-4" r="7"/><text class="small" x="12" y="0">matching point</text>
    <line class="dist" x1="128" y1="-4" x2="158" y2="-4"/><text class="small" x="166" y="0">distance computation</text>
  </g>
</svg>
