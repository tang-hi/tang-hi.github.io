<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 368" font-family="-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif">
  <defs>
    <filter id="ns" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0.8" stdDeviation="0.9" flood-color="#2e405b" flood-opacity="0.16"/>
    </filter>
  </defs>
  <style>
    .pt{ fill:#eef1f5; stroke:#aab3c2; stroke-width:1.6 }
    .faint{ fill:#f2f4f7; stroke:#c2c9d4; stroke-width:1.4; opacity:.7 }
    .m{ fill:#e4f3ee; stroke:#2f9e7b; stroke-width:1.9 }
    .drop{ fill:#f4f6f8; stroke:#b3bcc8; stroke-width:1.6; opacity:.8 }
    .x{ stroke:#c7254e; stroke-width:1.6; stroke-linecap:round; opacity:.75 }
    .q{ fill:#c7254e; stroke:#9e1c3e; stroke-width:1.3 }
    .plot{ fill:#fcfdfe; stroke:#e3e8ef; stroke-width:1.5 }
    .sel{ fill:none; stroke:#7d8aa0; stroke-width:1.8; stroke-dasharray:5 4 }
    .selfaint{ fill:none; stroke:#c6cdd8; stroke-width:1.6; stroke-dasharray:4 4 }
    .title{ font-size:14.5px; font-weight:600; fill:#2e405b }
    .small{ font-size:11px; fill:#6b7892 }
    .badge{ font-size:12px; font-weight:600; fill:#c7254e }
  </style>

  <rect x="1.5" y="1.5" width="717" height="365" rx="16" fill="#ffffff" stroke="#e7ebf1" stroke-width="1.5"/>

  <!-- ===== Panel A : pick top-k by distance ===== -->
  <g transform="translate(24,0)">
    <text class="title" x="150" y="30" text-anchor="middle">1. Take the top-5 by distance</text>
    <text class="small" x="150" y="48" text-anchor="middle">rank purely by distance — the filter is ignored</text>
    <rect class="plot" x="30" y="58" width="240" height="224" rx="10"/>
    <circle class="sel" cx="150" cy="170" r="50"/>
    <text class="small" x="150" y="128" text-anchor="middle" fill="#7d8aa0">top-5</text>
    <circle class="pt" cx="92" cy="116" r="6.5"/><circle class="pt" cx="210" cy="122" r="6.5"/><circle class="pt" cx="220" cy="186" r="6.5"/>
    <circle class="pt" cx="98" cy="226" r="6.5"/><circle class="pt" cx="188" cy="226" r="6.5"/><circle class="pt" cx="78" cy="172" r="6.5"/>
    <circle class="pt" cx="222" cy="154" r="6.5"/><circle class="pt" cx="160" cy="96" r="6.5"/><circle class="pt" cx="100" cy="92" r="6.5"/>
    <circle class="pt" cx="120" cy="153" r="6.5"/><circle class="pt" cx="176" cy="157" r="6.5"/><circle class="pt" cx="150" cy="137" r="6.5"/>
    <circle class="pt" cx="128" cy="197" r="6.5"/><circle class="pt" cx="178" cy="195" r="6.5"/>
    <g transform="translate(150,170) rotate(45)" filter="url(#ns)"><rect class="q" x="-7.5" y="-7.5" width="15" height="15" rx="3"/></g>
    <text class="small" x="150" y="306" text-anchor="middle">the 5 nearest are selected</text>
  </g>

  <line x1="360" y1="50" x2="360" y2="300" stroke="#eceff3" stroke-width="1.5"/>

  <!-- ===== Panel B : apply filter, results shrink ===== -->
  <g transform="translate(384,0)">
    <text class="title" x="150" y="30" text-anchor="middle">2. Then drop the non-matching</text>
    <text class="small" x="150" y="48" text-anchor="middle">whatever fails the filter is thrown away</text>
    <rect class="plot" x="30" y="58" width="240" height="224" rx="10"/>
    <circle class="selfaint" cx="150" cy="170" r="50"/>
    <!-- outer points: irrelevant, faint -->
    <circle class="faint" cx="92" cy="116" r="6"/><circle class="faint" cx="210" cy="122" r="6"/><circle class="faint" cx="220" cy="186" r="6"/>
    <circle class="faint" cx="98" cy="226" r="6"/><circle class="faint" cx="188" cy="226" r="6"/><circle class="faint" cx="78" cy="172" r="6"/>
    <circle class="faint" cx="222" cy="154" r="6"/><circle class="faint" cx="160" cy="96" r="6"/><circle class="faint" cx="100" cy="92" r="6"/>
    <!-- top-5 revealed: 2 kept (green), 3 dropped (grey + x) -->
    <circle class="m" cx="176" cy="157" r="6.5"/>
    <circle class="m" cx="128" cy="197" r="6.5"/>
    <g><circle class="drop" cx="120" cy="153" r="6.5"/><path class="x" d="M116,149 L124,157 M124,149 L116,157"/></g>
    <g><circle class="drop" cx="150" cy="137" r="6.5"/><path class="x" d="M146,133 L154,141 M154,133 L146,141"/></g>
    <g><circle class="drop" cx="178" cy="195" r="6.5"/><path class="x" d="M174,191 L182,199 M182,191 L174,199"/></g>
    <g transform="translate(150,170) rotate(45)" filter="url(#ns)"><rect class="q" x="-7.5" y="-7.5" width="15" height="15" rx="3"/></g>
    <rect x="90" y="84" width="120" height="24" rx="12" fill="#fdf0f3" stroke="#e9b8c2" stroke-width="1.2"/>
    <text class="badge" x="150" y="100" text-anchor="middle">5 wanted &#8594; 2 left</text>
    <text class="small" x="150" y="306" text-anchor="middle">a stricter filter can leave 0</text>
  </g>

  <!-- legend (centered) -->
  <g transform="translate(279,348)">
    <circle class="m" cx="0" cy="-4" r="7"/><text class="small" x="12" y="0">passes filter</text>
    <circle class="drop" cx="118" cy="-4" r="7"/><path class="x" d="M114,-8 L122,0 M122,-8 L114,0"/><text class="small" x="130" y="0">dropped</text>
  </g>
</svg>
