<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 762 360" font-family="-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif">
  <defs>
    <filter id="ns" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.1" flood-color="#2e405b" flood-opacity="0.18"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9" fill="none" stroke="#c7254e" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .edge{ stroke:#cdd4de; stroke-width:1.8; fill:none; stroke-linecap:round }
    .path{ stroke:#c7254e; stroke-width:3; fill:none; stroke-linecap:round }
    .nm{ fill:#eef1f5; stroke:#aab3c2; stroke-width:2 }
    .m{ fill:#e4f3ee; stroke:#2f9e7b; stroke-width:2.3 }
    .q{ fill:#c7254e; stroke:#9e1c3e; stroke-width:1.4 }
    .title{ font-size:14.5px; font-weight:600; fill:#2e405b }
    .lab{ font-size:12px; fill:#2e405b }
    .nlab{ font-size:11px; font-weight:600; fill:#2e405b }
    .small{ font-size:11px; fill:#6b7892 }
    .tag-g{ font-size:10.5px; fill:#7d8aa0; font-weight:600 }
    .tag-m{ font-size:10.5px; fill:#2f9e7b; font-weight:600 }
  </style>

  <rect x="1.5" y="1.5" width="759" height="357" rx="16" fill="#ffffff" stroke="#e7ebf1" stroke-width="1.5"/>

  <text class="title" x="30" y="36">result-gate: always walks the full graph</text>
  <text class="small" x="30" y="55">the red search path still passes through filtered-out (grey) nodes</text>

  <!-- faint background edges -->
  <path class="edge" d="M58,205 L140,262"/><path class="edge" d="M120,150 L140,262"/>
  <path class="edge" d="M188,205 L232,272"/><path class="edge" d="M232,272 L316,272"/>
  <path class="edge" d="M312,210 L316,272"/><path class="edge" d="M312,210 L404,235"/>
  <path class="edge" d="M372,158 L404,235"/><path class="edge" d="M250,150 L270,92"/>
  <path class="edge" d="M270,92 L344,92"/><path class="edge" d="M372,158 L344,92"/>
  <path class="edge" d="M188,205 L196,98"/><path class="edge" d="M196,98 L270,92"/>
  <path class="edge" d="M140,262 L232,272"/><path class="edge" d="M344,92 L404,235"/>

  <!-- highlighted search path -->
  <path class="path" d="M58,200 L120,150" marker-end="url(#arr)"/>
  <path class="path" d="M120,150 L188,205" marker-end="url(#arr)"/>
  <path class="path" d="M188,205 L250,150" marker-end="url(#arr)"/>
  <path class="path" d="M250,150 L312,210" marker-end="url(#arr)"/>
  <path class="path" d="M312,210 L372,158" marker-end="url(#arr)"/>

  <!-- off-path nodes -->
  <circle class="nm" cx="140" cy="262" r="10" filter="url(#ns)"/>
  <circle class="m"  cx="232" cy="272" r="10" filter="url(#ns)"/>
  <circle class="nm" cx="316" cy="272" r="10" filter="url(#ns)"/>
  <circle class="m"  cx="404" cy="235" r="10" filter="url(#ns)"/>
  <circle class="nm" cx="270" cy="92"  r="10" filter="url(#ns)"/>
  <circle class="m"  cx="344" cy="92"  r="10" filter="url(#ns)"/>
  <circle class="m"  cx="196" cy="98"  r="10" filter="url(#ns)"/>

  <!-- path grey nodes (stepping stones) -->
  <circle class="nm" cx="120" cy="150" r="11.5" filter="url(#ns)"/>
  <text class="tag-g" x="120" y="127" text-anchor="middle">stepping stone</text>
  <circle class="nm" cx="250" cy="150" r="11.5" filter="url(#ns)"/>
  <text class="tag-g" x="250" y="127" text-anchor="middle">stepping stone</text>

  <!-- path green nodes (ranked) -->
  <circle class="m" cx="188" cy="205" r="12" filter="url(#ns)"/><text class="nlab" x="188" y="209" text-anchor="middle">A</text>
  <circle class="m" cx="312" cy="210" r="12" filter="url(#ns)"/><text class="nlab" x="312" y="214" text-anchor="middle">B</text>
  <circle class="m" cx="372" cy="158" r="12" filter="url(#ns)"/><text class="nlab" x="372" y="162" text-anchor="middle">C</text>

  <!-- query -->
  <g transform="translate(58,200) rotate(45)" filter="url(#ns)"><rect class="q" x="-9" y="-9" width="18" height="18" rx="4"/></g>
  <text class="small" x="58" y="228" text-anchor="middle">query</text>

  <!-- bottom notes (stacked) -->
  <g transform="translate(30,316)">
    <circle class="nm" cx="6" cy="-4" r="7"/><text class="small" x="18" y="0">Grey — enters candidate-set, guides the walk, never ranked</text>
  </g>
  <g transform="translate(30,338)">
    <circle class="m" cx="6" cy="-4" r="7"/><text class="small" x="18" y="0">Green — passes filter, enters result-set (ranked)</text>
  </g>

  <!-- right: result-set leaderboard -->
  <rect x="548" y="74" width="188" height="208" rx="12" fill="#fbfcfd" stroke="#e3e8ef" stroke-width="1.5"/>
  <text class="lab" x="642" y="102" text-anchor="middle" font-weight="600">result-set</text>
  <text class="small" x="642" y="120" text-anchor="middle">the final top-k</text>
  <line x1="572" y1="132" x2="712" y2="132" stroke="#eceff3" stroke-width="1.5"/>
  <g transform="translate(584,158)">
    <text class="small" x="0" y="4">1</text><circle class="m" cx="26" cy="0" r="9"/><text class="nlab" x="26" y="4" text-anchor="middle">A</text>
    <text class="small" x="50" y="4">nearest</text>
  </g>
  <g transform="translate(584,196)">
    <text class="small" x="0" y="4">2</text><circle class="m" cx="26" cy="0" r="9"/><text class="nlab" x="26" y="4" text-anchor="middle">B</text>
  </g>
  <g transform="translate(584,234)">
    <text class="small" x="0" y="4">3</text><circle class="m" cx="26" cy="0" r="9"/><text class="nlab" x="26" y="4" text-anchor="middle">C</text>
  </g>
  <text class="tag-g" x="642" y="270" text-anchor="middle">grey nodes never make it here</text>
</svg>
